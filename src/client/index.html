<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>orca-viz</title>
    <script>
      /*
       * The theme, before the first paint — and it belongs here, in the document, rather than in
       * React: a page that mounted light and flipped to dark a frame later would flash white at
       * someone who has chosen not to be flashed at. Same key and same fallback as
       * `theme-mode.ts`, which owns the choice from here on.
       */
      try {
        var stored = localStorage.getItem('orca-viz-theme');
        var dark = stored ? stored === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      } catch (ignored) {
        // No storage and no media query is not a reason to fail to render.
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
